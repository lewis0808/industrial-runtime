<!doctype html>
<html lang="zh-CN" data-theme="irsp">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IRSP Console</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/dist/full.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="./styles.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-icon"></span>
      <span>IRSP CONSOLE</span>
    </div>
    <div id="livePill" class="live-pill offline">
      <span id="liveDot" class="live-dot offline"></span>
      <span id="liveText">OFFLINE</span>
    </div>
    <div id="serverInfo" class="mono text-muted text-xs flex-1">未连接</div>
    <div class="flex items-center gap-2">
      <input id="url" class="input mono w-64" value="ws://127.0.0.1:9777" />
      <button id="connect" class="btn btn-primary">连接</button>
      <button id="disconnect" class="btn btn-ghost" disabled>断开</button>
    </div>
  </header>

  <nav class="tab-nav">
    <div class="tab-item active" data-tab="monitor">实时监控</div>
    <div class="tab-item" data-tab="command">命令测试</div>
    <div class="tab-item" data-tab="benchmark">性能压测</div>
    <div class="tab-item" data-tab="writeback">写回测试</div>
  </nav>

  <main class="p-4">
    <section id="tab-monitor" class="tab-panel"></section>
    <section id="tab-command" class="tab-panel hidden"></section>
    <section id="tab-benchmark" class="tab-panel hidden"></section>
    <section id="tab-writeback" class="tab-panel hidden"></section>
  </main>

  <script type="module">
    import { IrspClient } from '../src/index.js';
    import monitor from './tabs/monitor.js';
    import command from './tabs/command.js';
    import benchmark from './tabs/benchmark.js';
    import writeback from './tabs/writeback.js';

    const tabs = { monitor, command, benchmark, writeback };
    const $ = (id) => document.getElementById(id);
    const livePill = $('livePill'), liveDot = $('liveDot'), liveText = $('liveText');
    const serverInfo = document.querySelector('#serverInfo');

    let client = null;
    const shared = { getClient: () => client };

    Object.values(tabs).forEach(t => t.init(shared));

    function setConnected(on) {
      if (on) {
        livePill.className = 'live-pill online';
        liveDot.className = 'live-dot online';
        liveText.textContent = 'LIVE';
      } else {
        livePill.className = 'live-pill offline';
        liveDot.className = 'live-dot offline';
        liveText.textContent = 'OFFLINE';
      }
      $('connect').disabled = on;
      $('disconnect').disabled = !on;
    }

    document.querySelectorAll('.tab-item').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const name = tab.dataset.tab;
        Object.entries(tabs).forEach(([k, t]) => {
          const panel = document.getElementById('tab-' + k);
          const visible = (k === name);
          panel.classList.toggle('hidden', !visible);
          if (visible) t.onShow?.();
          else t.onHide?.();
        });
      };
    });

    $('connect').onclick = async () => {
      const url = $('url').value.trim();
      client = new IrspClient(url);
      client.on('close', () => {
        setConnected(false);
        serverInfo.textContent = '已断开';
        serverInfo.className = 'mono text-red text-xs flex-1';
        Object.values(tabs).forEach(t => t.onDisconnect?.());
      });
      client.on('error', () => {
        serverInfo.textContent = '连接错误';
        serverInfo.className = 'mono text-red text-xs flex-1';
      });
      try {
        await client.connect();
        setConnected(true);
        serverInfo.textContent = `${client.server.server} · ${client.server.encoding}`;
        serverInfo.className = 'mono text-cyan text-xs flex-1';
        Object.values(tabs).forEach(t => t.onConnect?.());
      } catch (err) {
        serverInfo.textContent = '连接失败: ' + err.message;
        serverInfo.className = 'mono text-red text-xs flex-1';
        setConnected(false);
      }
    };

    $('disconnect').onclick = async () => {
      try { await client?.bye(); } catch {}
      setConnected(false);
    };

    // 时钟
    setInterval(() => {
      const now = new Date();
      const t = now.toLocaleTimeString('zh-CN', { hour12: false });
      const clockEl = document.getElementById('clock');
      if (clockEl) clockEl.textContent = t;
    }, 1000);
  </script>
</body>
</html>
