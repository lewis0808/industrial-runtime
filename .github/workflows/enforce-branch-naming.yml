name: Enforce Branch Naming

on:
  create:

jobs:
  check-branch-name:
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Validate and enforce branch name
        env:
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [[ "$BRANCH" == "main" || "$BRANCH" == "dev" ]]; then
            exit 0
          fi

          if [[ "$BRANCH" =~ ^(feature|fix|release|hotfix|chore)/.+ ]]; then
            echo "OK: $BRANCH"
          else
            gh api --method DELETE "/repos/$REPO/git/refs/heads/$BRANCH"

            gh api --method POST "/repos/$REPO/issues" \
              -f title="Invalid branch name / 分支命名不规范: $BRANCH" \
              -f body="@$ACTOR

Branch \`$BRANCH\` was deleted because it does not follow the naming convention.
分支 \`$BRANCH\` 不符合命名规范，已被自动删除。

**Valid formats / 合法格式：**
- \`feature/<description>\`
- \`fix/<description>\`
- \`release/<version>\`
- \`hotfix/<description>\`
- \`chore/<description>\`

Please recreate the branch with a valid name.
请按照规范重新创建分支。"

            exit 1
          fi