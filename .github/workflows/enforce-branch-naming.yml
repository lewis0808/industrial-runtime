name: Enforce Branch Naming

on:
  create:

jobs:
  check-branch-name:
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Validate and enforce branch name
        env:
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [[ "$BRANCH" == "main" || "$BRANCH" == "dev" ]]; then
            exit 0
          fi

          if [[ "$BRANCH" =~ ^(feature|fix|release|hotfix|chore)/.+ ]]; then
            echo "OK: $BRANCH"
          else
            gh api --method DELETE "/repos/$REPO/git/refs/heads/$BRANCH"

            BODY=$(printf "@%s\n\nBranch \`%s\` was deleted because it does not follow the naming convention.\n分支 \`%s\` 不符合命名规范，已被自动删除。\n\n**Valid formats / 合法格式：**\n- \`feature/<description>\`\n- \`fix/<description>\`\n- \`release/<version>\`\n- \`hotfix/<description>\`\n- \`chore/<description>\`\n\nPlease recreate the branch with a valid name.\n请按照规范重新创建分支。" "$ACTOR" "$BRANCH" "$BRANCH")

            gh api --method POST "/repos/$REPO/issues" \
              -f title="Invalid branch name / 分支命名不规范: $BRANCH" \
              -f "body=$BODY"

            exit 1
          fi